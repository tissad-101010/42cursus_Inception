#                            NGINX CONFIGURATION FILE                          #
# **************************************************************************** #

# user directive specifies the user that will be used to run the worker processes
user nginx;

# worker_processes directive specifies the number of worker processes that will be started
worker_processes auto; # auto : number of CPU cores
# worker_rlimit_nofile directive sets the maximum number of open file descriptors for each worker process
worker_rlimit_nofile 8192;
# pid directive sets the path to the file where the PID of the main process will be written
pid /run/nginx.pid;
# include the module configuration file
include /etc/nginx/modules-enabled/*.conf;
# error_log directive sets the path to the file where the error log will be written
error_log /var/log/nginx/error.log;
# events block defines the parameters that affect connection processing
events {
	worker_connections 1024; # maximum number of simultaneous connections that can be opened by a worker process
	use epoll; # specifies the event processing method
	multi_accept on; # allows a worker process to accept all new connections at a time
}
# http block defines the parameters that affect the behavior of the HTTP server
http {
	# sendfile directive enables or disables the use of sendfile
	sendfile on; # allows for more efficient file transfers
	# keepalive_timeout directive sets the timeout for keep-alive connections with the client
	keepalive_timeout 65; # the time a connection will be kept open
	# mime.types file contains the mapping of file name extensions to MIME types
	include /etc/nginx/mime.types;
	# default_type directive sets the default MIME type
	default_type application/octet-stream;
	# max amount of types that can be stored in the hash table of MIME types_hash_max_size
	types_hash_max_size 2048;
	# log_format directive defines the format of the access log
	access_log /var/log/nginx/access.log;
	# Include the configuration files present in the conf.d directory and the sites-enabled directory
	include /etc/nginx/conf.d/*.conf;
	include /etc/nginx/sites-enabled/*;
	# server block defines the parameters for the virtual server
	server {
		listen 80;
		return 301 https://$host$request_uri;
	}
	server {
		# listen directive sets the IP address and port number that the server listens on
		listen 443 ssl;# listen on port 443 using the SSL protocol
		# server_name directive sets the server name
		#server_name tissad.42.fr;
		# ssl_protocols directive sets the SSL protocols that the server will accept
		ssl_protocols TLSv1.2 TLSv1.3;  # TLS 1.2 et 1.3
		# ssl_ciphers directive sets the list of ciphers that the server will accept (cipher is a set of cryptographic algorithms)
		ssl_ciphers 'TLS_AES_128_GCM_SHA256:TLS_AES_256_GCM_SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-GCM-SHA256:!DSS:!3DES';  # Chiffres pour 1.2 et 1.3
		# ssl_prefer_server_ciphers directive enables or disables the server ciphers
		ssl_prefer_server_ciphers on;
		# certificate and key files
		ssl_certificate /etc/nginx/ssl/nginx.crt;
		ssl_certificate_key /etc/nginx/ssl/nginx.key;
		# root directive sets the root directory for the server		
		root /var/www/html/wordpress;  # root directory for the website
		# index directive sets the default file that the server should serve
		index index.php index.html index.html;
		# error_page directive sets the error page
		#error_page 404 /404.html;
		# location block defines the parameters for processing requests
		location / {
			try_files $uri $uri/ /index.php?$args; # specifies the files that should be tried to serve a request
		}
		# location block defines the parameters for processing requests
		location ~ \.php$ { # regular expression that matches the PHP files
			include			fastcgi_params;# include the fastcgi_params file
			fastcgi_pass	wordpress:9000;# specifies the address of the FastCGI server
			fastcgi_param	SCRIPT_FILENAME $document_root$fastcgi_script_name;# specifies the value of the SCRIPT_FILENAME parameter
			fastcgi_param	HTTP_HOST $host;# specifies the value of the HTTP_HOST parameter
			fastcgi_index	index.php;
		}
		# location block defines the parameters for processing requests 
		location ~ /\.ht { # regular expression that matches the .ht files
			deny all; # denies access to the .ht files
		}
		# location block defines the parameters for processing requests for static files
		location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|otf|eot|mp4|webm|ogv|htc)$ {
			expires max; # sets the expiration time for the cached content
			log_not_found off; # disables logging of the 404 errors
		}

	}
}
